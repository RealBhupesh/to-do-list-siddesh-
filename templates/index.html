<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <div class="page-shell">
    <div class="background-glow glow-one"></div>
    <div class="background-glow glow-two"></div>

    <main class="app-card">
      <section class="hero">
        <p class="eyebrow">Daily planner</p>
        <h1>Build a calm, clear day.</h1>
        <p class="hero-copy">made by Siddesh Dhatrak</p>
      </section>

      <section class="composer">
        <form id="todo-form" class="todo-form">
          <label class="sr-only" for="task-input">New task</label>
          <input id="task-input" name="task" type="text" placeholder="What needs to get done?" maxlength="120" required>
          <button type="submit">Add Task</button>
        </form>

        <div class="status-bar">
          <span id="task-count">0 tasks</span>
          <button id="clear-completed" class="ghost-button" type="button">Clear completed</button>
        </div>
      </section>

      <section class="list-panel">
        <ul id="todo-list" class="todo-list" aria-live="polite"></ul>
        <p id="empty-state" class="empty-state">No tasks yet. Start with one small thing.</p>
      </section>
    </main>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
