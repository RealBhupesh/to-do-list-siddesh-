{% extends "base.html" %}

{% block content %}
  <section class="single-panel">
    <div class="panel-heading">
      <p class="eyebrow">Agenda page</p>
      <h2>Upcoming sequence</h2>
      <p class="section-copy">This page combines reminder times and due dates so you can decide what comes next.</p>
    </div>

    <div id="agenda-list" class="stack-list"></div>
    <p id="agenda-empty" class="empty-state">Nothing urgent right now. Add a deadline or reminder on the Tasks page to build your day.</p>
  </section>
{% endblock %}
